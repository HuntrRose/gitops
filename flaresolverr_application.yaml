apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flaresolverr
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://k8s-home-lab.github.io/helm-charts/
      chart: flaresolverr
      targetRevision: 6.2.0
      helm:
        valueFiles:
          - $values/Flaresolverr/my-values.yaml     
    - repoURL: https://github.com/huntrrose/gitops.git
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/huntrrose/gitops.git
      targetRevision: HEAD
      path: Flaresolverr
    
  destination:
    server: https://kubernetes.default.svc
    namespace: flaresolverr
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    managedNamespaceMetadata:
      labels:
        app: shaarli