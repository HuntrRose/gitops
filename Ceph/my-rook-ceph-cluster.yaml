monitoring:
  enabled: true
  createPrometheusRules: true

cephClusterSpec:
  storage:
    useAllNodes: false
    useAllDevices: false
    config:
      databaseSizeMB: "1024"
    nodes:
      - name: "talos-worker01"
        devices:
          - name: "sdb"
      - name: "talos-worker02"
        devices:
          - name: "sdb"
      - name: "talos-worker03"
        devices:
          - name: "sdb"