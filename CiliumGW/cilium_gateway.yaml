apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gw-external
  labels:
    env: external
spec:
  gatewayClassName: cilium
  infrastructure:
    labels:
      env: external
  listeners:
    - protocol: HTTP
      port: 80
      name: web-gw
      allowedRoutes:
        namespaces:
          from: All
    - protocol: HTTP
      port: 80
      name: shaarli-http
      hostname: shaarli.huntrrose.com
      allowedRoutes:
        namespaces:
          from: shaarli

---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gw-internal
  labels:
    env: internal
spec:
  gatewayClassName: cilium
  infrastructure:
    labels:
      env: internal
  listeners:
    - protocol: HTTP
      port: 80
      name: web-gw
      allowedRoutes:
        namespaces:
          from: All

