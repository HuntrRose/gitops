server:
  dataStorage:
    enabled: true
    mountPath: /vault/data
    storageClass: nfs-server
    accessMode: ReadWriteOnce
    size: 1Gi
    
  auditStorage:
    enabled: true
    mountPath: /vault/audit
    storageClass: nfs-server
    accessMode: ReadWriteOnce
    size: 1Gi

ui:
  enabled: true
  serviceType: LoadBalancer
  externalPort: 8200