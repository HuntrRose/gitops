server:
  securityContext:
    fsGroup: 1000
    runAsUser: 100
  dataStorage:
    enabled: true
    size: 1Gi
    storageClass: nfs-server
  auditStorage:
    enabled: true
    size: 1Gi
    storageClass: nfs-server
  resources:
    requests:
      cpu: 250m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  
