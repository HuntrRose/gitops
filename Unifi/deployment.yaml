apiVersion: apps/v1
kind: Deployment
metadata:
  name: unifi-db
  namespace: unifi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unifi-db
  template:
    metadata:
      labels:
        app: unifi-db
    spec:
      containers:
      - name: unifi-db  
        image: docker.io/mongo:8.2.7
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: unifi-db-secret
              key: username
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: unifi-db-secret
              key: password
        - name: MONGO_USER
          valueFrom:
            secretKeyRef:
              name: unifi-db-secret
              key: username
        - name: MONGO_PASS
          valueFrom:
            secretKeyRef:
              name: unifi-db-secret
              key: password
        - name: MONGO_DB
          value: unifi
        - name: MONGO_AUTHSOURCE
          value: admin
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
        ports:
        - containerPort: 27017
        volumeMounts:
        - name: unifi-db-data
          mountPath: /data/db
      volumes:
      - name: unifi-db-data
        persistentVolumeClaim:
          claimName: unifidb-storage
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unifi
  namespace: unifi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unifi
  template:
    metadata:
      labels:
        app: unifi
    spec:
      containers:
      - name: unifi
        image: lscr.io/linuxserver/unifi-network-application:latest
        env:
        - name: MONGO_HOST
          value: unifi-db
        - name: MONGO_PORT
          value: "27017"
        - name: MONGO_USER
          valueFrom:
            secretKeyRef:
              name: unifi-db-secret
              key: username
        - name: MONGO_PASS
          valueFrom:
            secretKeyRef:
              name: unifi-db-secret
              key: password
        - name: MONGO_DB
          value: unifi
        volumeMounts:
        - name: unifi-storage
          mountPath: /config
      volumes:
      - name: unifi-storage
        persistentVolumeClaim:
          claimName: unifi-storage