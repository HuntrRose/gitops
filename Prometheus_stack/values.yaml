alertmanager:
  alertmanagerspec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: nfs-server
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi
prometheus:
  prometheusspec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: nfs-server
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 30Gi

kubeEtcd:
  endpoints: 
    - 10.50.0.20

grafana:
  service:
    type: LoadBalancer
    labels:
      env: internal
  persistence:
    enabled: true
    storageClassName: nfs-server
    accessModes:
      - ReadWriteOnce
    size: 10Gi