# Source: homepage/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homepage
  labels:
    helm.sh/chart: homepage-4.12.1
    app.kubernetes.io/name: homepage
    app.kubernetes.io/instance: homepage
    app.kubernetes.io/version: "v1.13.1"
    app.kubernetes.io/part-of: homepage
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: homepage
      app.kubernetes.io/instance: homepage
  template:
    metadata:
      labels:
        helm.sh/chart: homepage-4.12.1
        app.kubernetes.io/name: homepage
        app.kubernetes.io/instance: homepage
        app.kubernetes.io/version: "v1.13.1"
        app.kubernetes.io/part-of: homepage
        app.kubernetes.io/managed-by: Helm
    spec:
      serviceAccountName: homepage
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: homepage
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            privileged: false
            readOnlyRootFilesystem: false
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          image: "ghcr.io/gethomepage/homepage:v1.13.1"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
          readinessProbe:
            httpGet:
              path: /
              port: http
          resources:
            {}
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: homepage,homepage.homepage,homepage.homepage.svc,homepage.homepage.svc.cluster,homepage.homepage.svc.cluster.local,homepage.huntrrose.local
          volumeMounts:
            - name: config
              mountPath: /app/config
            - name: logs
              mountPath: /app/config/logs
      volumes:
        - name: config
          emptyDir: {}
        - name: logs
          emptyDir: {}
---
