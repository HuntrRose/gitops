apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homepage
  labels:
    helm.sh/chart: homepage-4.12.1
    app.kubernetes.io/name: homepage
    app.kubernetes.io/instance: homepage
    app.kubernetes.io/version: "v1.13.1"
    app.kubernetes.io/part-of: homepage
    app.kubernetes.io/managed-by: Helm
spec:
  parentRefs:
    - name: gw-internal
      namespace: gateway
  hostnames:
    - homepage.huntrrose.local
  rules:
    - backendRefs:
        - name: homepage
          port: 80
      matches:
        - path:
            type: PathPrefix
            value: /
