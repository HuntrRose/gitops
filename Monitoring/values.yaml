# ============================================================
# GRAFANA
# ============================================================
grafana:
  enabled: true
  adminUser: admin
  adminPassword: admin

  service:
    type: ClusterIP
    port: 80

  ingress:
    enabled: false
    ingressClassName: aws-alb
    annotations:
      kubernetes.io/ingress.class: aws-alb
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
      # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:6:certificate/a302cf3a-9f-d6ac33967545
      alb.ingress.kubernetes.io/group.name: apps
      alb.ingress.kubernetes.io/ssl-redirect: "443"
    hosts:
      - domian.com
    path: /
    pathType: Prefix
    tls:
      - hosts: [domian.com]
  plugins:
    - grafana-exploretraces-app

  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://observability-kube-prometh-prometheus.observability.svc.cluster.local:9090
          access: proxy
          isDefault: true
          uid: prometheus
        - name: Loki
          type: loki
          url: http://observability-loki.observability.svc.cluster.local:3100
          access: proxy
          uid: loki
        - name: Tempo
          type: tempo
          url: http://observability-tempo.observability.svc.cluster.local:3200
          access: proxy
          uid: tempo
          jsonData:
            httpMethod: GET
            serviceMap:
              datasourceUid: prometheus
            tracesToMetrics:
              datasourceUid: prometheus
            tracesToLogs:
              datasourceUid: "Loki"
              filterByTraceID: true
              mapTagNamesEnabled: true

  persistence:
    enabled: true
    storageClassName: nfs-server
    accessModes:
      - ReadWriteOnce
    size: 5Gi

  # nodeSelector:
  #   intent: observability
  # tolerations:
  #   - key: "observability"
  #     operator: "Equal"
  #     value: "true"
  #     effect: "NoSchedule"

  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 300m
      memory: 1Gi

    # ============================================================
  # GRAFANA DASHBOARDS — AUTO-PROVISIONED
  # ============================================================

  # # Enable dashboard provisioning
