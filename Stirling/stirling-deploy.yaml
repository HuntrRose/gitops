apiVersion: apps/v1
kind: Deployment
metadata:
  name: stirling-deployment
  namespace: stirling-pdf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stirling
  template:
    metadata:
      labels:
        app: stirling
    spec:
      containers:
        - name: stirling-pdf
          image: stirlingtools/stirling-pdf:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            limits:
              memory: "1024Mi"
              cpu: "1"
            requests:
              memory: "128Mi"
              cpu: "250m"
          env:
            - name: SECURITY_ENABLELOGIN
              value: "false"
            - name: SECURITY_ENABLEUSERCREATION
              value: "false"
            - name: SECURITY_ENABLEANONYMOUSACCESS
              value: "true"
            - name: SECURITY_ENABLELDAP
              value: "false"
            - name: SECURITY_ENABLEOIDC
              value: "false"
            - name: SECURITY_ENABLESAML
              value: "false"
            - name: SECURITY_ENABLEJWT
              value: "false"
            - name: SECURITY_APIKEY
              value: "false"
          volumeMounts:
            - name: stirling-pvc
              mountPath: /usr/share/tessdata
              subPath: tessdata
            - name: stirling-pvc
              mountPath: /configs
              subPath: configs
            - name: stirling-pvc
              mountPath: /logs
              subPath: logs
            - name: stirling-pvc
              mountPath: /pipeline
              subPath: pipeline
      volumes:
        - name: stirling-pvc
          persistentVolumeClaim:
            claimName: stirling-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: stirling-service
  namespace: stirling-pdf
  labels:
    env: internal
spec:
  type: LoadBalancer
  selector:
    app: stirling
  ports:
    - protocol: TCP
      port: 80  
      targetPort: 8080