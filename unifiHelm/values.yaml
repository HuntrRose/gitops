    enabled: true
    storageClass: nfs-server
    accessMode: ReadWriteOnce
    size: 30Gi
  mongo:
    enabled: true
    storageClass: nfs-server
    accessMode: ReadWriteOnce
    size: 10Gi
  backups:
    enabled: true
    storageClass: nfs-server
    accessMode: ReadWriteOnce
    size: 10Gi

service:
  type: ClusterIP
  #loadBalancerIP: "10.50.0.151"
  

unifiExporter:
  serviceMonitor:
    enabled: true