apiVersion: "cilium.io/v2alpha1"
kind: CiliumL2AnnouncementPolicy
metadata:
  name: test-policy
spec:
  serviceSelector:
    matchExpressions:
      - {key: env, operator: In, values: [test, experiment]}
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: DoesNotExist
  #interfaces:
  #  - ^enx00155d00024[a-f0-9]+
  loadBalancerIPs: true
  externalIPs: true