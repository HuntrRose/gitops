apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-app
  template:
    metadata:
      labels:
        app: test-app
    spec:
      containers:
      - name: test-container
        image: nginx
        ports:
        - name: http
          containerPort: 80
        - name: https
          containerPort: 443
---
apiVersion: v1
kind: Service
metadata:
  name: test-service
  labels:
    env: test
spec:
  type: LoadBalancer
  selector:
    app: test-app
  ports:
  - name: web
    port: 80
    targetPort: http
  - name: websec
    port: 443
    targetPort: https
  