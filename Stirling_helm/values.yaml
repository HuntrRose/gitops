service:
  type: LoadBalancer
  labels: 
    env: home
serviceMonitor:
  enabled: false

resources:
  limits:
    cpu: 100m
    memory: 128Mi
    ephemeral-storage: 100Mi
  requests:
    cpu: 80m
    memory: 64Mi

persistence:
  enabled: true
  volumes:
    - name: trainingdata
      contrainerMount: /usr/share/tessdata
      pvc: stirling-pvc
      subPath: tessdata
    - name: configs 
      contrainerMount: /configs
      pvc: stirling-pvc
      subPath: configs
    - name: logs
      contrainerMount: /logs
      pvc: stirling-pvc
      subPath: logs
    - name: pipeline
      contrainerMount: /pipeline
      pvc: stirling-pvc
      subPath: pipeline 