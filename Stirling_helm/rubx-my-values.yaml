common:
  service:
      enabled: false
  persistence:
    enabled: true
    
    volumes:
      - name: "trainingdata"
        storageClassName: longhorn
        size: "10Gi"
        pvcClaim: ""
        containerMount: "/usr/share/tessdata"
      - name: "config"
        storageClassName: longhorn
        size: "1Gi"
        pvcClaim: ""
        containerMount: "/configs"
      - name: "log"
        storageClassName: longhorn
        size: "1Gi"
        pvcClaim: ""
        containerMount: "/logs"
      - name: "pdfdata"
        storageClassName: longhorn
        size: "1Gi"
        pvcClaim: ""
        containerMount: "/tmp"
  ingress:
    enabled: false