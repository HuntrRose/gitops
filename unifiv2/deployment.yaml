apiVersion: v1
kind: Namespace
metadata:
  name: unifi
  labels:
    # Essentially disables PodSecurity for this namespace
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
    pod-security.kubernetes.io/audit: privileged
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unifi-os-server
  namespace: unifi
  labels:
    app: unifi-os-server
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: unifi-os-server
  template:
    metadata:
      labels:
        app: unifi-os-server
    spec:
      containers:
      - name: unifi-os-server
        image: ghcr.io/lemker/unifi-os-server:latest
        env:
        - name: UOS_SYSTEM_IP
          value: "unifi.huntrrose.local"
        securityContext:
          privileged: true
        ports:
        - name: webui
          containerPort: 443
          protocol: TCP
        - name: rtp
          containerPort: 5005
          protocol: TCP
        - name: id-hub
          containerPort: 9543
          protocol: TCP
        - name: mobile-spdtest
          containerPort: 6789
          protocol: TCP
        - name: communication
          containerPort: 8080
          protocol: TCP
        - name: network-app
          containerPort: 8443
          protocol: TCP
        - name: hotspot-secured
          containerPort: 8444
          protocol: TCP
        - name: syslog
          containerPort: 5514
          protocol: UDP
        - name: discovery
          containerPort: 10003
          protocol: UDP
        - name: site-supervisr
          containerPort: 11084
          protocol: TCP
        - name: aqmps
          containerPort: 5671
          protocol: TCP
        - name: hspot-redir-0
          containerPort: 8880
          protocol: TCP
        - name: hspot-redir-1
          containerPort: 8881
          protocol: TCP
        - name: hspot-redir-2
          containerPort: 8882
          protocol: TCP
        volumeMounts:
        - name: unifi-os-server-data
          mountPath: /persistent
          subPath: persistent
        - name: unifi-os-server-data
          mountPath: /var/log
          subPath: log
        - name: unifi-os-server-data
          mountPath: /data
          subPath: data
        - name: unifi-os-server-data
          mountPath: /srv
          subPath: srv
        - name: unifi-os-server-data
          mountPath: /var/lib/unifi
          subPath: unifi
        - name: unifi-os-server-data
          mountPath: /var/lib/mongodb
          subPath: mongodb
        - name: unifi-os-server-data
          mountPath: /etc/rabbitmq/ssl
          subPath: rabbitmq
        livenessProbe:
          httpGet:
            path: /api/ping
            port: 80
          initialDelaySeconds: 10          
          periodSeconds: 60
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        resources:
          requests:
            memory: "1024Mi"
            cpu: "250m"
          limits:
            memory: "2048Mi"
            cpu: "500m"
      volumes:
      - name: unifi-os-server-data
        persistentVolumeClaim:
          claimName: unifi-os-server-pvc