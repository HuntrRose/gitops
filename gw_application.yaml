apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gw-application
  namespace: argocd
spec:
  project: default
  sources:
             
    - repoURL: https://github.com/huntrrose/gitops.git
      targetRevision: HEAD
      path: CiliumGW
      
  destination:
    server: https://kubernetes.default.svc
    namespace: gateway
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
